<svg width="600" height="900" viewBox="0 0 600 900" xmlns="http://www.w3.org/2000/svg">
  <!--
    TEMPLATE POSTER - Employee Self Service
    Ukuran: 600 x 900 px (rasio 2:3 portrait) - INI UKURAN PAS untuk tile shelf.
    Cara pakai di Figma: File > Place image / drag SVG ini ke canvas.
    Ganti gradient + foto latar sesukamu, taruh judul di safe area bawah.
    Export akhir: PNG/JPG 600x900 (atau 2x = 1200x1800 untuk retina).
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#64d2ff"/>
      <stop offset="0.55" stop-color="#0a84ff"/>
      <stop offset="1" stop-color="#0a2a52"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.25" cy="0.12" r="0.7">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="scrim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.45" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.72"/>
    </linearGradient>
  </defs>

  <!-- Layer 1: base artwork (GANTI dengan foto/ilustrasi ESS) -->
  <rect width="600" height="900" fill="url(#bg)"/>
  <rect width="600" height="900" fill="url(#glow)"/>

  <!-- Layer 2: bottom scrim so the title stays readable -->
  <rect width="600" height="900" fill="url(#scrim)"/>

  <!-- Title lockup (safe area) -->
  <text x="44" y="784" font-family="Archivo, Arial, sans-serif" font-size="52" font-weight="800" fill="#ffffff" letter-spacing="-1">Employee</text>
  <text x="44" y="838" font-family="Archivo, Arial, sans-serif" font-size="52" font-weight="800" fill="#ffffff" letter-spacing="-1">Self Service</text>

  <!-- corner app mark placeholder (top-right) -->
  <rect x="524" y="28" width="48" height="48" rx="12" fill="#000000" fill-opacity="0.35"/>

  <!-- === GUIDE (hapus / sembunyikan layer ini sebelum export) === -->
  <g stroke="#ffffff" stroke-opacity="0.25" stroke-dasharray="6 8" fill="none">
    <rect x="40" y="40" width="520" height="820" rx="8"/>
  </g>
  <text x="44" y="66" font-family="Arial" font-size="16" fill="#ffffff" fill-opacity="0.6">Safe area (margin 40px) - taruh judul di 1/3 bawah</text>
</svg>
